<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentikacija</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            <h1 class="header-naslov">PulseGrid</h1>
        </div>
        <nav>
            <a href="#" class="header-nav-btn">Početna</a>
            <a href="#" class="header-nav-btn">Turniri</a>
            <a href="#" class="header-nav-btn">Igre</a>
            <a href="#" class="header-nav-btn">O nama</a>
        </nav>
        Autentikacija
    </header>
    <main>
        <div class="card" id="login-panel">
            <h2 id="auth-title">Prijava</h2>
            <form>
                <h3>Korisničko ime</h3>
                <input class="input-field" type="text"/>
                <br>
                <h3>Lozinka</h3>
                <input class="input-field" type="password" />
                <br><br><br>
                <input value="Prijavi se" class="input-button" type="submit"/>
            </form>
        </div>
    </main>
</body>
</html>
