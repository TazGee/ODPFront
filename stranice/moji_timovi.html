<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timovi</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            <h1 class="header-naslov">PulseGrid</h1>
        </div>
        <nav>
            <a href="#" class="header-nav-btn">Početna</a>
            <a href="#" class="header-nav-btn">Turniri</a>
            <a href="#" class="header-nav-btn">Igre</a>
            <a href="#" class="header-nav-btn">O nama</a>
        </nav>
        <button class="header-user">
            <div class="profile-button">
                <img class="header-profilna" src="ikonice/person.png" alt="">
                Korisničko ime
            </div>
        </button>
    </header>
    <main class="lista-main">
        <div class="lista-panel" style="width: 40%; height: auto;">
            <h2>Lista vaših timova</h2><br>
            <div class="lista-divova">
                <div class="tim">
                    <div class="team-icon">
                        <img class="slika-tima" src="timovi/Astralis_logo.svg.png" alt="">
                    </div>
                    <div class="turnir-info">
                        <h3 id="naziv-turnira">Astralis</h3>
                    </div>
                    <button class="turnir-edit">Detaljnije</button>
                </div>
                <div class="tim">
                    <div class="team-icon">
                        <img class="slika-tima" src="timovi/NAVI-Logo.svg.png" alt="">
                    </div>
                    <div class="turnir-info">
                        <h3 id="naziv-turnira">Natus Vincere</h3>
                    </div>
                    <button class="turnir-edit">Detaljnije</button>
                </div>
                <div class="tim">
                    <div class="team-icon">
                        <img class="slika-tima" src="timovi/Faze_Clan.svg" alt="">
                    </div>
                    <div class="turnir-info">
                        <h3 id="naziv-turnira">Faze Clan</h3>
                    </div>
                    <button class="turnir-edit">Detaljnije</button>
                </div>
                <div class="tim">
                    <div class="team-icon">
                        <img class="slika-tima" src="timovi/OpTic_Gaminglogo_square.webp" alt="">
                    </div>
                    <div class="turnir-info">
                        <h3 id="naziv-turnira">Optic Gaming</h3>
                    </div>
                    <button class="turnir-edit">Detaljnije</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
