<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            <h1 class="header-naslov">PulseGrid</h1>
        </div>
        <nav>
            <a href="#" class="header-nav-btn">Početna</a>
            <a href="#" class="header-nav-btn">Turniri</a>
            <a href="#" class="header-nav-btn">Igre</a>
            <a href="#" class="header-nav-btn">O nama</a>
        </nav>
        <button class="header-user">
            <div class="profile-button">
                <img class="header-profilna" src="ikonice/person.png" alt="">
                Korisničko ime
            </div>
        </button>
    </header>
    <main class="lista-main">
        <div class="lista-panel" style="width: 70%;">
            <h2>Lista mečeva koje pratite</h2><br>
            <div class="lista-divova">
                <div class="mec">
                    <div class="team left">
                        <img class="slika-igrice" src="timovi/Astralis_logo.svg.png" alt="">
                        <h3 class="naziv-tima">Astralis</h3>
                    </div>
                    <div class="mec-info">
                        <h3 id="naziv-turnira" style="font-size: 2vw;">0 - 0</h3>
                        <h4 class="igra-informacija" id="igra-zanr-igre">
                            Status: <span style="color: rgb(0, 119, 255);">Počinje 15-12-2025 16:00</span>
                        </h4>
                        <button class="obrisi-sa-watchlist-btn">Skloni sa watchlist-e</button>
                    </div>
                    <div class="team right">
                        <h3 class="naziv-tima">Natus Vincere</h3>
                        <img class="slika-igrice" src="timovi/NAVI-Logo.svg.png" alt="">
                    </div>
                </div>
                <div class="mec">
                    <div class="team left">
                        <img class="slika-igrice" src="timovi/NAVI-Logo.svg.png" alt="">
                        <h3 class="naziv-tima">Natus Vincere</h3>
                    </div>
                    <div class="mec-info">
                        <h3 id="naziv-turnira" style="font-size: 2vw;">1 - 0</h3>
                        <h4 class="igra-informacija" id="igra-zanr-igre">
                            Status: <span style="color: rgb(0, 197, 13);">Trenutno u toku...</span>
                        </h4>
                        <button class="obrisi-sa-watchlist-btn">Skloni sa watchlist-e</button>
                    </div>
                    <div class="team right">
                        <h3 class="naziv-tima">Faze Clan</h3>
                        <img class="slika-igrice" src="timovi/Faze_Clan.svg" alt="">
                    </div>
                </div>
                <div class="mec">
                    <div class="team left">
                        <img class="slika-igrice" src="timovi/OpTic_Gaminglogo_square.webp" alt="">
                        <h3 class="naziv-tima">Optic Gaming</h3>
                    </div>
                    <div class="mec-info">
                        <h3 id="naziv-turnira" style="font-size: 2vw;">3 - 1</h3>
                        <h4 class="igra-informacija" id="igra-zanr-igre">
                            Status: <span style="color: rgb(255, 204, 0);">Završen</span>
                        </h4>
                        <button class="obrisi-sa-watchlist-btn">Skloni sa watchlist-e</button>
                    </div>
                    <div class="team right">
                        <h3 class="naziv-tima">Natus Vincere</h3>
                        <img class="slika-igrice" src="timovi/NAVI-Logo.svg.png" alt="">
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
