<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igre</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            <h1 class="header-naslov">PulseGrid</h1>
        </div>
        <nav>
            <a href="#" class="header-nav-btn">Početna</a>
            <a href="#" class="header-nav-btn">Turniri</a>
            <a href="#" class="header-nav-btn">Igre</a>
            <a href="#" class="header-nav-btn">O nama</a>
        </nav>
        <button class="header-user">
            <div class="profile-button">
                <img class="header-profilna" src="ikonice/person.png" alt="">
                Korisničko ime
            </div>
        </button>
    </header>
    <main class="lista-main">
        <div class="lista-panel" style="width: 50%;">
            <h2>Lista igara</h2><br>
            <div class="lista-divova">
                <div class="igra">
                    <img class="slika-igrice" src="igre/cs2.jpg" alt="">
                    <div class="turnir-info">
                        <h3 id="naziv-turnira">Counter-Strike 2</h3>
                        <div class="igra-details">
                            <h4 class="igra-informacija" id="igra-zanr-igre">
                                Zanr igre: <span style="color: rgb(221, 202, 0);">Pucačina</span>
                            </h4>
                            <h4 class="igra-informacija" id="igra-broj-igraca">
                                Maksimalan broj igrača po timu: <span style="color: rgb(189, 225, 255);">5</span>
                            </h4>
                        </div>
                    </div>
                </div>
                <div class="igra">
                    <img class="slika-igrice" src="igre/halo.webp" alt="">
                    <div class="turnir-info">
                        <h3 id="naziv-turnira">Halo Infinite</h3>
                        <div class="igra-details">
                            <h4 class="igra-informacija" id="igra-zanr-igre">
                                Zanr igre: <span style="color: rgb(221, 202, 0);">Pucačina</span>
                            </h4>
                            <h4 class="igra-informacija" id="igra-broj-igraca">
                                Maksimalan broj igrača po timu: <span style="color: rgb(189, 225, 255);">4</span>
                            </h4>
                        </div>
                    </div>
                </div>
                <div class="igra">
                    <img class="slika-igrice" src="igre/warthunder.webp" alt="">
                    <div class="turnir-info">
                        <h3 id="naziv-turnira">War Thunder</h3>
                        <div class="igra-details">
                            <h4 class="igra-informacija" id="igra-zanr-igre">
                                Zanr igre: <span style="color: rgb(221, 202, 0);">Action Simulation</span>
                            </h4>
                            <h4 class="igra-informacija" id="igra-broj-igraca">
                                Maksimalan broj igrača po timu: <span style="color: rgb(189, 225, 255);">12</span>
                            </h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
