<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            <h1 class="header-naslov">PulseGrid</h1>
        </div>
        <nav>
            <a href="#" class="header-nav-btn">Početna</a>
            <a href="#" class="header-nav-btn">Turniri</a>
            <a href="#" class="header-nav-btn">Igre</a>
            <a href="#" class="header-nav-btn">O nama</a>
        </nav>
        <button class="header-user">
            <div class="profile-button">
                <img class="header-profilna" src="ikonice/person.png" alt="">
                Korisničko ime
            </div>
        </button>
    </header>
    <main class="lista-main">
        <div class="lista-panel" style="width: 80vw;">
            <h2>Audit log</h2><br>
            <div class="lista-divova">
                <div class="audit">
                    <h3 class="audit-text-header" style="width: 15%;">Korisnik</h3>
                    <h3 class="audit-text-header" style="width: 15%;">Akcija</h3>
                    <h3 class="audit-text-header" style="width: 31%;">Opis</h3>
                    <h3 class="audit-text-header" style="width: 10%;">IP adresa</h3>
                    <h3 class="audit-text-header" style="width: 10%;">Status</h3>
                    <h3 class="audit-text-header" style="width: 15%;">Datum i vreme</h3>
                </div>
                <div class="audit">
                    <div class="row" style="width: 20%;">
                        <img class="audit-profilna" src="ikonice/person.png" alt="">
                        <h3 class="audit-text">Korisničko ime</h3>
                    </div>
                    <h3 class="audit-text" style="width: 10%;">Izmena imena</h3>
                    <h3 class="audit-text" style="width: 35%;">Opis u kom piše šta je neko uradio u momentu.</h3>
                    <h3 class="audit-text" style="width: 10%;">192.168.0.0</h3>
                    <h3 class="audit-text" style="width: 10%;">Uspešno</h3>
                    <h3 class="audit-text" style="width: 15%;">15-12-2025 16:33</h3>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
