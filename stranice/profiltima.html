<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PusleGrid</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            <h1 class="header-naslov">PulseGrid</h1>
        </div>

        <nav>
            <a href="#" class="header-nav-btn">Početna</a>
            <a href="#" class="header-nav-btn">Turniri</a>
            <a href="#" class="header-nav-btn">Igre</a>
            <a href="#" class="header-nav-btn">O nama</a>
        </nav>
        <button class="header-user">
            <div class="profile-button">
                <img class="header-profilna" src="ikonice/person.png" alt="">
                Korisničko ime
            </div>
        </button>
    </header>
    <main>
        <div class="team-card">
            <h2 style="text-align: center; font-size: 32px;">Naziv Tima</h2><br>
            <div class="row">
                <div class="team-panel">
                    <h3 style="text-align: center;">Lista igraca</h3>
                    <div class="lista-igraca-informacije">
                        <div class="igrac">
                            <img class="slika-igraca" src="ikonice/person.png" alt="">
                            <p class="ime-igraca">ŽilićLanmi123</p>
                            <img class="slika-igraca" src="ikonice/crown.png" alt="">
                        </div>
                        <div class="igrac">
                            <img class="slika-igraca" src="ikonice/person.png" alt="">
                            <p class="ime-igraca">TazGee04</p>
                            <img class="slika-igraca" src="ikonice/joystick.png" alt="">
                        </div>
                        <div class="igrac">
                            <img class="slika-igraca" src="ikonice/person.png" alt="">
                            <p class="ime-igraca">donvlepa69</p>
                            <img class="slika-igraca" src="ikonice/joystick.png" alt="">
                        </div>
                        <div class="igrac">
                            <img class="slika-igraca" src="ikonice/person.png" alt="">
                            <p class="ime-igraca">Skopi</p>
                            <img class="slika-igraca" src="ikonice/joystick.png" alt="">
                        </div>
                    </div>
                </div>
                <div class="team-panel">
                    <h3 style="text-align: center;">Informacije</h3>
                    <div class="lista-igraca-informacije">
                        <div class="tim-informacija">
                            <img class="team-panel-logo" src="timovi/Astralis_logo.svg.png" alt="">
                        </div>
                        <br>
                        <div class="tim-informacija">
                            <p class="opis-tima">Opis tima u kom se nalaze sve informacije o timu, istoriji
                                tima, formiranju tima i tako tim stvarima... Ovde treba da bude ovako mnogo teksta...
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
